name: Sync & Deploy

on:
  schedule:
    - cron: '0 3 * * 1'   # 每周一 03:00 UTC
  workflow_dispatch:         # 手动触发

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install OpenCLI
        run: npm install -g @jackwener/opencli@latest

      - name: Sync data
        run: opencli list -f json > public/data.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.json
          if git diff --cached --quiet; then
            echo "No data changes"
          else
            git commit -m "sync: update opencli data [$(date -u +%Y-%m-%d)]"
            git push
          fi

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@latest pages deploy dist --project-name=opencli-gallery --branch=main
