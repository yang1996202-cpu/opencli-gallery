name: Sync OpenCLI Data

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install OpenCLI
        run: npm install -g @jackwener/opencli@latest

      - name: Sync Data
        run: opencli list -f json > public/data.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "sync: update opencli data [$(date -u +%Y-%m-%d)]"
            git push
          fi
